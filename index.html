<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sách Lật (Flipbook)</title>
    <style>
        /* Thiết lập nền và căn giữa cuốn sách */
        body {
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }

        /* Khung chứa cuốn sách */
        .flip-book {
            width: 400px;
            height: 600px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* Định dạng cho từng trang sách */
        .page {
            background-color: white;
            /* background-size: cover giúp hình ảnh tự động thu phóng vừa vặn với trang */
            background-size: cover; 
            background-position: center;
            border: solid 1px #ccc;
        }
    </style>
</head>
<body>

    <!-- Bắt đầu phần cuốn sách -->
    <div class="flip-book" id="flipbook">
        
        <!-- TRANG BÌA -->
        <div class="page" style="background-image: url('biatruoc.png');"></div>
        
        <!-- CÁC TRANG BÊN TRONG -->
        <div class="page" style="background-image: url('hinh1.png');"></div>
        <div class="page" style="background-image: url('hinh2.png');"></div>
        <div class="page" style="background-image: url('hinh3.png');"></div>
        <div class="page" style="background-image: url('hinh4.png');"></div>
        <div class="page" style="background-image: url('hinh5.png');"></div>
        <div class="page" style="background-image: url('hinh6.png');"></div>
        <div class="page" style="background-image: url('hinh7.png');"></div>
        <div class="page" style="background-image: url('hinh8.png');"></div>
        <div class="page" style="background-image: url('hinh9.png');"></div>
        <div class="page" style="background-image: url('hinh10.png');"></div>
        
        <!-- TRANG BÌA SAU -->
        <div class="page" style="background-image: url('biasau.png');"></div>
        
    </div>

    <!-- Nhúng thư viện StPageFlip từ CDN -->
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
    
    <!-- Cấu hình hiệu ứng lật sách -->
    <script>
        const pageFlip = new St.PageFlip(
            document.getElementById('flipbook'),
            {
                width: 400, // Chiều rộng 1 trang (px)
                height: 600, // Chiều cao 1 trang (px)
                size: "fixed",
                showCover: true // True: Đặt trang đầu và cuối làm bìa cứng
            }
        );

        // Load các trang vào thư viện
        pageFlip.loadFromHTML(document.querySelectorAll('.page'));
    </script>
</body>
</html>
